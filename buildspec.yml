version: 0.2
# AWS CodeBuild spec — builds the MCP server Docker image and pushes to ECR.
#
# The deploy.sh script creates a CodeBuild project that references this file.
# ECR_REPO_URI and AWS_DEFAULT_REGION are injected as environment variables
# by deploy.sh; they are NOT stored here.

phases:
  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" |
          docker login --username AWS --password-stdin "$ECR_REPO_URI"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t "$ECR_REPO_URI:latest" .

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push "$ECR_REPO_URI:latest"
      - echo "Build complete. Image pushed to $ECR_REPO_URI:latest"
