# AWS App Runner build and run configuration.
#
# App Runner pulls this repo directly from GitHub, builds using the commands
# below, and starts the MCP server. DEEPGRAM_API_KEY is injected at runtime
# from AWS Secrets Manager by deploy.sh — it is NOT stored here.
#
# Reference: https://docs.aws.amazon.com/apprunner/latest/dg/config-file.html

version: 1.0
runtime: python312

build:
  commands:
    build:
      - pip install -r requirements.txt

run:
  command: python deepgram_tools_mcp.py --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: MCP_HOST
      value: "0.0.0.0"
    - name: MCP_PORT
      value: "8080"
    - name: PYTHONUNBUFFERED
      value: "1"
